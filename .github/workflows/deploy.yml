name: Deploy to Infomaniak

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger deploy webhook
    runs-on: ubuntu-latest

    steps:
      - name: Ping deploy.php
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/out.txt -w "%{http_code}" "https://dxascanlausanne.com/deploy.php?token=$DEPLOY_TOKEN")
          cat /tmp/out.txt
          if [ "$STATUS" != "200" ]; then
            echo "Deploy failed with HTTP $STATUS"
            exit 1
          fi
          echo "Deploy successful!"
